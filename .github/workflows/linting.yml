name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, labeled, unlabeled, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go mod download

  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.2
          install-mode: goinstall

  test:
    name: Test
    needs: setup
    runs-on: ubuntu-latest
    outputs:
      total: ${{ steps.coverage.outputs.total }}
      tests: ${{ steps.coverage.outputs.tests }}
      passed: ${{ steps.coverage.outputs.passed }}
      failed: ${{ steps.coverage.outputs.failed }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./... 2>&1 | tee test-output.txt
      - name: Parse results
        if: always()
        id: coverage
        run: |
          TOTAL=$(go tool cover -func=coverage.out 2>/dev/null | grep '^total:' | awk '{print $NF}') || TOTAL="N/A"
          # Use go tool test2json for structured parsing instead of fragile grep patterns
          go tool test2json < test-output.txt > test-results.json 2>/dev/null || true
          PASSED=$(jq -s '[.[] | select(.Action=="pass") | select(.Test)] | length' test-results.json 2>/dev/null) || PASSED=0
          FAILED=$(jq -s '[.[] | select(.Action=="fail") | select(.Test)] | length' test-results.json 2>/dev/null) || FAILED=0
          TESTS=$((PASSED + FAILED))
          echo "total=${TOTAL}" >> "$GITHUB_OUTPUT"
          echo "tests=${TESTS}" >> "$GITHUB_OUTPUT"
          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build all binaries
        run: go build ./...

  vulncheck:
    name: Vulncheck
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  docker-build:
    name: Docker Build (${{ matrix.service }})
    if: contains(github.event.pull_request.labels.*.name, 'dependencies') && (contains(github.event.pull_request.labels.*.name, 'go') || contains(github.event.pull_request.labels.*.name, 'docker'))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: Dockerfile.api
          - service: cluster-controller
            dockerfile: Dockerfile.cluster-controller
          - service: collector
            dockerfile: Dockerfile.collector
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          build-args: |
            VERSION=ci
            GIT_COMMIT=${{ github.sha }}
            GIT_TREE_STATE=dirty
            BUILD_DATE=${{ github.event.pull_request.updated_at }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  proto:
    name: Proto
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-action@v1
        with:
          lint: true
          breaking: true
          breaking_against: .git#ref=${{ github.event.pull_request.base.sha }}

  comment:
    name: PR Comment
    if: always() && github.event_name == 'pull_request'
    needs: [lint, test, build, vulncheck, proto, docker-build]
    runs-on: ubuntu-latest
    steps:
      - uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: ci-results
          message: |
            ## CI Results

            | Check | Status |
            |-------|--------|
            | **Lint** | ${{ needs.lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |
            | **Test** | ${{ needs.test.result == 'success' && '✅ Passed' || '❌ Failed' }} |
            | **Build** | ${{ needs.build.result == 'success' && '✅ Passed' || '❌ Failed' }} |
            | **Vulncheck** | ${{ needs.vulncheck.result == 'success' && '✅ Passed' || '❌ Failed' }} |
            | **Proto** | ${{ needs.proto.result == 'success' && '✅ Passed' || '❌ Failed' }} |
            | **Docker Build** | ${{ needs.docker-build.result == 'success' && '✅ Passed' || needs.docker-build.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |

            **Tests:** ${{ needs.test.outputs.passed || '0' }} passed, ${{ needs.test.outputs.failed || '0' }} failed (${{ needs.test.outputs.tests || '0' }} total) | **Coverage:** ${{ needs.test.outputs.total || 'N/A' }}
