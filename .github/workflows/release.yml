# Release workflow - triggers when a release is published via GitHub UI
# Builds all service images unconditionally on every release

name: Release

on:
  release:
    types: [published]

env:
  REGISTRY: quay.io

jobs:
  # Build, scan, and sign Go service images
  build-services:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: Dockerfile.api
            image: quay.io/clusterpulse/api
          - service: cluster-controller
            dockerfile: Dockerfile.cluster-controller
            image: quay.io/clusterpulse/cluster-controller
          - service: collector
            dockerfile: Dockerfile.collector
            image: quay.io/clusterpulse/collector
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=sha,prefix=sha-
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            GIT_TREE_STATE=clean
            BUILD_DATE=${{ github.event.release.published_at }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: mode=min

#      - name: Scan image with Trivy
#        uses: aquasecurity/trivy-action@master
#        with:
#          image-ref: ${{ matrix.image }}@${{ steps.build.outputs.digest }}
#          format: sarif
#          output: trivy-${{ matrix.service }}.sarif
#          severity: HIGH,CRITICAL
#          exit-code: '1'
#
#      - name: Upload Trivy SARIF
#        if: always()
#        uses: github/codeql-action/upload-sarif@v3
#        with:
#          sarif_file: trivy-${{ matrix.service }}.sarif
#          category: trivy-${{ matrix.service }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes ${{ matrix.image }}@${{ steps.build.outputs.digest }}

      - name: Save digest
        run: echo "${{ steps.build.outputs.digest }}" > digest.txt

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.service }}
          path: digest.txt
          retention-days: 1

  # Build and push UI
  build-ui:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Generate deployer token
        id: deployer-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DEPLOYER_APP_ID }}
          private-key: ${{ secrets.DEPLOYER_APP_PRIVATE_KEY }}
          owner: ClusterPulse
          repositories: ui
      - uses: actions/checkout@v6
        with:
          repository: ClusterPulse/ui
          token: ${{ steps.deployer-token.outputs.token }}
          path: ui
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/clusterpulse/ui
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=sha,prefix=sha-
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        id: build
        with:
          context: ui/
          file: ui/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            GIT_TREE_STATE=clean
            BUILD_DATE=${{ github.event.release.published_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=min

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/clusterpulse/ui@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-ui.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-ui.sarif
          category: trivy-ui

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes ${{ env.REGISTRY }}/clusterpulse/ui@${{ steps.build.outputs.digest }}

  # Create a release on the ClusterPulse/ui repo
  release-ui:
    needs: build-ui
    runs-on: ubuntu-latest
    steps:
      - name: Generate deployer token
        id: deployer-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DEPLOYER_APP_ID }}
          private-key: ${{ secrets.DEPLOYER_APP_PRIVATE_KEY }}
          owner: ClusterPulse
          repositories: operator,ui

      - name: Create UI release
        env:
          GH_TOKEN: ${{ steps.deployer-token.outputs.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          gh release create "$VERSION" \
            --repo ClusterPulse/ui \
            --title "ClusterPulse UI $VERSION" \
            --notes "Automated release for ClusterPulse $VERSION.

          **Source release:** ${{ github.server_url }}/${{ github.repository }}/releases/tag/$VERSION
          **Image:** \`${{ env.REGISTRY }}/clusterpulse/ui:$VERSION\`
          **Digest:** \`${{ needs.build-ui.outputs.digest }}\`"

  # Build and deploy documentation
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DOCS_APP_ID }}
          private-key: ${{ secrets.DOCS_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: pip install mkdocs-material mike mkdocs-mermaid2-plugin
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Generate CRD reference docs
        run: |
          go install github.com/elastic/crd-ref-docs@v0.3.0
          crd-ref-docs \
            --source-path=api/v1alpha1 \
            --config=docs/crd-ref-docs.yaml \
            --renderer=markdown \
            --output-path=docs/references/crds.md
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - run: mike deploy --push --update-aliases ${{ github.ref_name }} latest

  # Update operator repo with new image tags and CRDs
  update-operator:
    needs: [build-services, build-ui]
    if: >-
      !cancelled() &&
      needs.build-services.result == 'success' &&
      needs.build-ui.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Generate deployer token
        id: deployer-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DEPLOYER_APP_ID }}
          private-key: ${{ secrets.DEPLOYER_APP_PRIVATE_KEY }}
          owner: ClusterPulse
          repositories: operator,ui

      - name: Checkout main repo
        uses: actions/checkout@v6
        with:
          path: main-repo

      - name: Checkout operator repo
        uses: actions/checkout@v6
        with:
          repository: ClusterPulse/operator
          token: ${{ steps.deployer-token.outputs.token }}
          path: operator-repo

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: main-repo/go.mod

      - name: Update images and generate CRDs
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VALUES="operator-repo/helm-charts/clusterpulse/values.yaml"
          KUSTOMIZATION="operator-repo/config/crd/kustomization.yaml"

          # Update image tags
          sed -i "s|image: quay.io/clusterpulse/api:.*|image: quay.io/clusterpulse/api:${VERSION}|" "$VALUES"
          sed -i "s|image: quay.io/clusterpulse/cluster-controller:.*|image: quay.io/clusterpulse/cluster-controller:${VERSION}|" "$VALUES"
          sed -i "s|image: quay.io/clusterpulse/ui:.*|image: quay.io/clusterpulse/ui:${VERSION}|" "$VALUES"

          # Generate CRDs from Go types
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@latest
          controller-gen crd paths="./main-repo/api/v1alpha1/..." output:crd:dir=operator-repo/config/crd/bases

          # Add any new CRDs to kustomization.yaml
          for crd in operator-repo/config/crd/bases/*.yaml; do
            filename="bases/$(basename "$crd")"
            if ! grep -qF "$filename" "$KUSTOMIZATION"; then
              sed -i "/# +kubebuilder:scaffold:crdkustomizeresource/i - ${filename}" "$KUSTOMIZATION"
            fi
          done

      - name: Create pull request
        env:
          VERSION: ${{ github.ref_name }}
          GH_TOKEN: ${{ steps.deployer-token.outputs.token }}
        working-directory: operator-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="release/${VERSION}"
          git checkout -b "$BRANCH"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update images and CRDs for ${VERSION}"
          git push origin "$BRANCH"
          gh pr create \
            --title "ClusterPulse release ${VERSION}" \
            --body "Automated update of image tags and CRDs for release ${VERSION}." \
            --base main

  # Update the GitHub Release with build info
  update-release:
    if: ${{ !cancelled() }}
    needs: [build-services, build-ui, release-ui, deploy-docs, update-operator]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download API digest
        if: needs.build-services.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: digest-api
          path: digests/api

      - name: Download Cluster Controller digest
        if: needs.build-services.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: digest-cluster-controller
          path: digests/cluster-controller

      - name: Download Collector digest
        if: needs.build-services.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: digest-collector
          path: digests/collector

      - name: Build release body and update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"

          # Read digests from artifacts
          API_DIGEST=$(cat digests/api/digest.txt 2>/dev/null || echo "")
          CC_DIGEST=$(cat digests/cluster-controller/digest.txt 2>/dev/null || echo "")
          COLLECTOR_DIGEST=$(cat digests/collector/digest.txt 2>/dev/null || echo "")

          {
            echo "## Build Summary"
            echo ""
            echo "**Triggered by:** ${{ github.actor }}"
            echo "**Commit:** [\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
            echo ""
            echo "### Images"
            echo ""
            echo "| Service | Status | Digest |"
            echo "|---------|--------|--------|"

            # API
            if [[ "${{ needs.build-services.result }}" == "success" && -n "$API_DIGEST" ]]; then
              echo "| \`${{ env.REGISTRY }}/clusterpulse/api\` | Pushed | \`${API_DIGEST}\` |"
            else
              echo "| \`${{ env.REGISTRY }}/clusterpulse/api\` | Failed | — |"
            fi

            # Cluster Controller
            if [[ "${{ needs.build-services.result }}" == "success" && -n "$CC_DIGEST" ]]; then
              echo "| \`${{ env.REGISTRY }}/clusterpulse/cluster-controller\` | Pushed | \`${CC_DIGEST}\` |"
            else
              echo "| \`${{ env.REGISTRY }}/clusterpulse/cluster-controller\` | Failed | — |"
            fi

            # Collector
            if [[ "${{ needs.build-services.result }}" == "success" && -n "$COLLECTOR_DIGEST" ]]; then
              echo "| \`${{ env.REGISTRY }}/clusterpulse/collector\` | Pushed | \`${COLLECTOR_DIGEST}\` |"
            else
              echo "| \`${{ env.REGISTRY }}/clusterpulse/collector\` | Failed | — |"
            fi

            # UI
            if [[ "${{ needs.build-ui.result }}" == "success" ]]; then
              echo "| \`${{ env.REGISTRY }}/clusterpulse/ui\` | Pushed | \`${{ needs.build-ui.outputs.digest }}\` |"
            else
              echo "| \`${{ env.REGISTRY }}/clusterpulse/ui\` | Failed | — |"
            fi

            echo ""
            echo "### Tags"
            echo ""
            echo "All pushed images were tagged with:"
            echo ""
            echo "- \`${TAG}\`"
            echo "- \`sha-${GITHUB_SHA::7}\`"
            echo "- \`latest\`"
            echo ""
            echo "### UI Release"
            echo ""
            if [[ "${{ needs.release-ui.result }}" == "success" ]]; then
              echo "UI release created at [ClusterPulse/ui $TAG](${{ github.server_url }}/ClusterPulse/ui/releases/tag/$TAG)."
            else
              echo "UI release **failed** or was skipped."
            fi
            echo ""
            echo "### Documentation"
            echo ""
            if [[ "${{ needs.deploy-docs.result }}" == "success" ]]; then
              echo "Docs deployed for version \`${TAG}\` (aliased to \`latest\`)."
            else
              echo "Docs deployment **failed**."
            fi
          } > release-body.md

          # Also write to step summary
          cat release-body.md >> "$GITHUB_STEP_SUMMARY"

          # Append build info to existing release body
          EXISTING=$(gh release view "$TAG" --json body -q '.body')
          SEPARATOR="---"
          BODY=$(printf '%s\n\n%s\n\n%s' "$EXISTING" "$SEPARATOR" "$(cat release-body.md)")
          gh release edit "$TAG" --notes "$BODY"
