site_name: ClusterPulse Documentation
site_description: Multi-cluster Kubernetes monitoring with RBAC
site_url: https://clusterpulse.github.io/clusterpulse/

repo_name: ClusterPulse/clusterpulse
repo_url: https://github.com/ClusterPulse/clusterpulse
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # Light mode
    - scheme: default
      accent: green
      toggle:
        icon: lucide/sun
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      accent: green
      toggle:
        icon: lucide/moon
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  generator: false
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ClusterPulse/clusterpulse
